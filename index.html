<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Playground</title>
</head>
<body>
  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="code-animator">Code Animator</button>
    <button class="tab-btn" data-tab="scrambler">Scrambler</button>
  </div>

  <!-- Code Animator Tab -->
  <div class="tab-content active" id="tab-code-animator">
    <div class="controls">
      <h1>Code Animator</h1>

      <div class="control-group">
        <label>Code Input</label>
        <textarea id="codeInput">function fibonacci(n) {
  if (n <= 1) return n;

  let prev = 0, curr = 1;

  for (let i = 2; i <= n; i++) {
    const next = prev + curr;
    prev = curr;
    curr = next;
  }

  return curr;
}

// Calculate the 10th Fibonacci number
const result = fibonacci(10);
console.log("Result:", result);</textarea>
      </div>

      <div class="control-group">
        <label>Font Family</label>
        <select id="fontFamily"></select>
      </div>

      <div class="control-group">
        <label>Font Size</label>
        <div class="range-value">
          <input type="range" id="fontSize" min="10" max="32" value="16">
          <span id="fontSizeValue">16px</span>
        </div>
      </div>

      <div class="control-group">
        <label>Theme</label>
        <select id="theme">
          <option value="midnight">Midnight</option>
          <option value="dracula">Dracula</option>
          <option value="monokai">Monokai</option>
          <option value="nord">Nord</option>
          <option value="synthwave">Synthwave</option>
          <option value="matrix">Matrix</option>
          <option value="paper">Paper (Light)</option>
          <option value="solarized">Solarized Dark</option>
          <option value="cyberpunk">Cyberpunk</option>
          <option value="sunset">Sunset</option>
        </select>
      </div>

      <div class="control-group">
        <label>Cursor Style</label>
        <select id="cursorStyle">
          <option value="block">Block (Filled)</option>
          <option value="outline">Block (Outline)</option>
          <option value="outline-x">Block (X)</option>
          <option value="ibeam">I-Beam</option>
          <option value="underscore">Underscore</option>
          <option value="triangle">Triangle</option>
          <option value="none">None</option>
        </select>
      </div>

      <div class="control-group">
        <label>Typing Effect</label>
        <select id="typingEffect">
          <option value="normal">Normal (Left to Right)</option>
          <option value="natural">Natural (Human-like)</option>
          <option value="word">Word by Word</option>
          <option value="token">Whole Words/Tokens</option>
          <option value="line">Line by Line</option>
          <option value="random">Random Characters</option>
          <option value="reverse">Reverse (Right to Left)</option>
          <option value="middle-out">Middle Out</option>
          <option value="ends-in">Ends to Middle</option>
          <option value="typewriter">Typewriter (with mistakes)</option>
        </select>
      </div>

      <div class="control-group">
        <label>Character Animation</label>
        <select id="charAnimation">
          <option value="none">None</option>
          <option value="wave">Wave</option>
          <option value="fade">Fade In</option>
          <option value="scale">Scale In</option>
          <option value="slide">Slide In</option>
          <option value="glitch">Glitch</option>
        </select>
      </div>

      <div class="control-group">
        <label>Syntax Highlighting</label>
        <select id="syntaxStyle">
          <option value="none">None</option>
          <option value="static">Static</option>
          <option value="glow">Glow Effect</option>
          <option value="rainbow">Rainbow Cycle</option>
          <option value="pulse">Pulse</option>
        </select>
      </div>

      <div class="control-group">
        <label>Speed (ms per tick)</label>
        <div class="range-value">
          <input type="range" id="speed" min="10" max="500" value="50">
          <span id="speedValue">50ms</span>
        </div>
      </div>

      <div class="control-group">
        <label>Characters per Tick</label>
        <div class="range-value">
          <input type="range" id="charsPerTick" min="1" max="10" value="1">
          <span id="charsPerTickValue">1</span>
        </div>
      </div>

      <div class="control-group">
        <label>Options</label>
        <div class="checkbox-group">
          <label><input type="checkbox" id="showLineNumbers"> Line Numbers</label>
          <label><input type="checkbox" id="showWindowControls" checked> Window Dots</label>
          <label><input type="checkbox" id="cursorBlink" checked> Cursor Blink</label>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn" id="startBtn">Play</button>
        <button class="btn secondary" id="resetBtn">Reset</button>
      </div>

      <div class="btn-row">
        <button class="btn secondary" id="pauseBtn">Pause</button>
        <button class="btn secondary" id="instantBtn">Instant</button>
      </div>
    </div>

    <div class="preview-container">
      <div class="preview-header">
        <h2>Preview</h2>
        <div class="stats">
          <span id="charCount">0 / 0 chars</span>
          <span id="lineCount">0 lines</span>
        </div>
      </div>
      <div class="preview">
        <div class="code-display theme-midnight" id="codeDisplay">
          <div class="window-controls" id="windowControls">
            <div class="window-dot red"></div>
            <div class="window-dot yellow"></div>
            <div class="window-dot green"></div>
          </div>
          <pre id="codeOutput"><code></code></pre>
        </div>
      </div>
    </div>
  </div>

  <!-- Scrambler Tab -->
  <div class="tab-content" id="tab-scrambler">
    <div class="controls">
      <h1>Scrambler</h1>

      <div class="control-group">
        <label>Target Text</label>
        <input type="text" id="scrambleText" value="Hello World" placeholder="Enter text to scramble...">
      </div>

      <div class="control-group">
        <label>Font Family</label>
        <select id="scrambleFont"></select>
      </div>

      <div class="control-group">
        <label>Font Size</label>
        <div class="range-value">
          <input type="range" id="scrambleFontSize" min="24" max="200" value="72">
          <span id="scrambleFontSizeValue">72px</span>
        </div>
      </div>

      <div class="control-group">
        <label>Scramble Char Size</label>
        <div class="range-value">
          <input type="range" id="scrambleCharSize" min="12" max="200" value="58">
          <span id="scrambleCharSizeValue">58px</span>
        </div>
      </div>

      <div class="control-group">
        <label>Scramble Letter Spacing</label>
        <div class="range-value">
          <input type="range" id="scrambleLetterSpacing" min="-11" max="50" value="-2">
          <span id="scrambleLetterSpacingValue">-2px</span>
        </div>
      </div>

      <div class="control-group">
        <label>Pool Preset</label>
        <select id="scramblePoolPreset">
          <option value="dot">Dot Mode</option>
          <option value="ascii">ASCII Mode</option>
          <option value="custom">Custom</option>
        </select>
      </div>

      <div class="control-group">
        <label>Character Pool</label>
        <input type="text" id="scramblePool" value="⠁⠂⠃⠄⠅⠆⠇⠈⠉⠊⠋⠌⠍⠎⠏⠐⠑⠒⠓⠔⠕⠖⠗⠘⠙⠚⠛⠜⠝⠞⠟⠠⠡⠢⠣⠤⠥⠦⠧⠨⠩⠪⠫⠬⠭⠮⠯⠰⠱⠲⠳⠴⠵⠶⠷⠸⠹⠺⠻⠼⠽⠾⠿">
      </div>

      <div class="control-group">
        <label>Scramble Mode</label>
        <select id="scrambleMode">
          <option value="wholeWord">Whole Word</option>
          <option value="letterByLetter">Letter by Letter</option>
          <option value="wave">Wave</option>
          <option value="randomResolve">Random Resolve</option>
          <option value="outsideIn">Outside-In</option>
          <option value="insideOut">Inside-Out</option>
          <option value="bounce">Bounce</option>
          <option value="cascade" selected>Cascade</option>
          <option value="longRandomResolve">Long Random Resolve</option>
        </select>
      </div>

      <div class="control-group">
        <label>Speed (ms per frame)</label>
        <div class="range-value">
          <input type="range" id="scrambleSpeed" min="16" max="200" value="50">
          <span id="scrambleSpeedValue">50ms</span>
        </div>
      </div>

      <div class="control-group">
        <label>Duration (iterations before resolve)</label>
        <div class="range-value">
          <input type="range" id="scrambleDuration" min="5" max="100" value="30">
          <span id="scrambleDurationValue">30</span>
        </div>
      </div>

      <div class="control-group">
        <label>Text Color</label>
        <input type="color" id="scrambleColor" value="#111111">
      </div>

    </div>

    <div class="preview-container">
      <div class="preview-header">
        <h2>Preview</h2>
      </div>
      <div class="scrambler-preview">
        <div class="scrambler-display" id="scramblerDisplay"></div>
      </div>
    </div>

    <div class="scrambler-actions">
      <div class="record-status" id="scrambleRecordStatus"></div>
      <button class="btn secondary" id="scrambleResetBtn">Reset</button>
      <button class="btn secondary" id="scrambleRecordBtn">Record</button>
      <button class="btn" id="scramblePlayBtn">Play</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
